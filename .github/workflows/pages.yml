name: Deploy storefront preview to GitHub Pages

# Publishes the static mockup/ storefront (driven by the real product catalog)
# so the client can view it at https://<owner>.github.io/<repo>/
# One-time setup: repo Settings → Pages → Source → "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "mockup/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload storefront artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mockup

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

services:
  db:
    image: postgres:16
    container_name: txb_postgres
    environment:
      POSTGRES_DB: txballistics
      POSTGRES_USER: txballistics
      POSTGRES_PASSWORD: txballistics
    ports:
      - "5432:5432"
    volumes:
      - txb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txballistics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  txb_pgdata:
